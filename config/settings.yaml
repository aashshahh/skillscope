model:
  spacy_model: en_core_web_sm
  sbert_model: all-MiniLM-L6-v2
  similarity_threshold: 0.65
  top_k_skills: 30

extraction:
  min_skill_length: 2
  max_skill_length: 6
  use_esco: true
  use_pattern_rules: true

gap_analysis:
  missing_skill_threshold: 0.60
  partial_match_threshold: 0.80

api:
  host: "0.0.0.0"
  port: 8000
  cors_origins:
    - "http://localhost:5173"
    - "http://localhost:3000"
    - "https://aashshahh.github.io"

logging:
  level: INFO
  format: "{time:YYYY-MM-DD HH:mm:ss} | {level} | {message}"